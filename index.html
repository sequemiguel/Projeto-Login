<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    <title>Login</title>
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja benvindo(a) novamente faça login para acessar a sua conta e para fazer as configurações que desejares.</p>
                <form action="login.php" method="post" autocomplete="on">
                    <div class="campo">
                        <label for="ilogin">E-mail</label>
                        <i class="bi bi-lock-fill"></i>
                        <input type="email" name="login" id="ilogin" placeholder="Seu Email" autocomplete="email" required maxlength="50">
                    </div>
                    <div class="campo">
                        <label for="isenha">Senha</label>
                        <i class="bi bi-eye-slash-fill"></i>
                        <input type="password" name="senha
                        " id="isenha" placeholder="Sua senha" autocomplete="current-password" required mixlength="8" maxlength="20">
                    </div>
                    <input type="submit" value="Entrar">
                    <a href="esqueci.html" class="botao"> Esqueci a senha<a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
